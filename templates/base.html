<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}L'Élite Gastronomique | Premium Dining{% endblock %}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Experience the finest culinary journey at L'Élite. Modern, elegant, and luxurious dining for the connoisseurs.">
    <meta name="keywords" content="luxury restaurant, fine dining, premium food, reservation, elite restaurant">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lenis@1.0.45/dist/lenis.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Premium Preloader -->
    <div id="preloader" style="position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div class="logo" style="font-size: 40px; margin-bottom: 20px; opacity: 0;" id="loader-logo">L'ÉLITE</div>
        <div style="width: 200px; height: 1px; background: rgba(212, 175, 55, 0.2); position: relative;">
            <div id="loader-progress" style="position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--accent);"></div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div id="cursor" class="custom-cursor"></div>
    <div id="cursor-follower" class="custom-cursor-follower"></div>

    <!-- Noise Texture Overlay -->
    <div class="noise"></div>

    <!-- Floating Cart Button -->
    <div id="cart-trigger" class="cart-btn" onclick="toggleCart()">
        <span class="cart-count">0</span>
        🛒
    </div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Order</h3>
            <button onclick="toggleCart()" class="close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items">
            <p style="text-align: center; color: var(--text-secondary); margin-top: 50px;">Your cart is empty.</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-amount">$0</span>
            </div>
            <p style="font-size: 10px; color: var(--accent); margin-bottom: 15px;">✓ FREE HOME DELIVERY INCLUDED</p>
            <button class="btn" style="width: 100%" onclick="showCheckout()">Checkout</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="luxury-font">Delivery Details</h2>
            <form id="order-form">
                <input type="text" name="address" placeholder="Delivery Address" required>
                <input type="tel" name="phone" placeholder="Phone Number" required>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn" style="flex: 1; border-color: var(--text-secondary); color: var(--text-secondary);" onclick="closeCheckout()">Cancel</button>
                    <button type="submit" class="btn" style="flex: 2;">Place Order</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scroll Progress Indicator -->
    <div id="scroll-progress" style="position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: var(--accent); z-index: 2000;"></div>

    {% include 'components/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
